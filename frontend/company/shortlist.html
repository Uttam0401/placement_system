<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>Shortlist – CPMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Sora:wght@700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="../assets/css/styles.css"/>
</head>
<body>
<div class="app">
    <aside class="sidebar">
        <div class="sidebar-brand"><div class="brand-icon">🏢</div><h2>Campus Placement</h2><span>Company Portal</span></div>
        <nav class="sidebar-nav">
            <div class="nav-section">Main</div>
            <div class="nav-item" data-page="dashboard.html"><div class="nav-icon">📊</div><span>Dashboard</span></div>
            <div class="nav-item" data-page="post-job.html"><div class="nav-icon">➕</div><span>Post Job</span></div>
            <div class="nav-item" data-page="applicants.html"><div class="nav-icon">👥</div><span>Applicants</span></div>
            <div class="nav-item active" data-page="shortlist.html"><div class="nav-icon">🌟</div><span>Shortlist</span></div>
        </nav>
        <div class="sidebar-footer">
            <div class="sidebar-user">
                <div class="s-avatar" id="s-avatar">C</div>
                <div><div class="s-name" id="s-name">Company</div><div class="s-role" id="s-role">HR Manager</div></div>
                <button class="btn-logout">🚪</button>
            </div>
        </div>
    </aside>

    <main class="main">
        <div class="topbar">
            <div class="topbar-left"><h1>Shortlisted Candidates</h1><p id="topbar-sub">Candidates selected for further rounds</p></div>
            <div class="topbar-right"><button class="topbar-btn" id="sidebar-toggle">☰</button></div>
        </div>
        <div class="page">

            <!-- Status tabs -->
            <div style="display:flex;gap:8px;margin-bottom:24px;" id="tabs">
                <button class="btn btn-primary btn-sm" data-s="SHORTLISTED" onclick="setTab('SHORTLISTED')">🌟 Shortlisted</button>
                <button class="btn btn-outline btn-sm" data-s="PLACED"      onclick="setTab('PLACED')">🏆 Placed</button>
                <button class="btn btn-outline btn-sm" data-s="UNDER_REVIEW" onclick="setTab('UNDER_REVIEW')">🔍 Under Review</button>
            </div>

            <div class="card">
                <div class="card-header">
                    <div><h3 id="tab-title">Shortlisted Candidates</h3><p id="tab-count">Loading…</p></div>
                </div>
                <div class="tbl-wrap">
                    <table class="tbl">
                        <thead><tr><th>Candidate</th><th>Branch</th><th>CGPA</th><th>Role Applied</th><th>Feedback</th><th>Status</th><th>Actions</th></tr></thead>
                        <tbody id="list-body"><tr><td colspan="7" style="padding:40px;text-align:center;color:#94a3b8;">Loading…</td></tr></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="../assets/js/utils.js"></script>
<script>
    if (!Auth.require('COMPANY')) throw 0;
    setupSidebar('HR Manager');

    let allApps = [], curTab = 'SHORTLISTED';

    const tabTitles = { SHORTLISTED:'🌟 Shortlisted Candidates', PLACED:'🏆 Placed Candidates', UNDER_REVIEW:'🔍 Under Review' };

    async function load() {
      try {
        const jobs = await Api.get('/company/jobs');
        const all  = await Promise.all(jobs.map(j => Api.get(`/company/jobs/${j.id}/applicants`).catch(()=>[])));
        allApps = all.flat();
        render();
      } catch(e) { Toast.show('Failed to load','error'); }
    }

    function setTab(s) {
      curTab = s;
      document.querySelectorAll('#tabs button').forEach(b =>
        b.className = b.dataset.s === s ? 'btn btn-primary btn-sm' : 'btn btn-outline btn-sm');
      document.getElementById('tab-title').textContent = tabTitles[s] || s;
      render();
    }

    function render() {
      const apps = allApps.filter(a => a.status === curTab);
      document.getElementById('tab-count').textContent = `${apps.length} candidate${apps.length!==1?'s':''}`;
      const tbody = document.getElementById('list-body');
      if (!apps.length) { tbody.innerHTML = `<tr><td colspan="7">${UI.empty('No candidates','👥','No one in this category yet')}</td></tr>`; return; }
      tbody.innerHTML = apps.map(a => `
        <tr>
          <td>
            <div style="display:flex;align-items:center;gap:9px;">
              <div style="width:34px;height:34px;background:linear-gradient(135deg,${curTab==='PLACED'?'#8b5cf6,#6d28d9':'#0d1b2a,#243b55'});border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;">${UI.initials(a.student?.name)}</div>
              <div><div style="font-weight:600;font-size:13px;">${a.student?.name||'—'}</div>
                   <div style="font-size:11px;color:#94a3b8;">${a.student?.email||''}</div></div>
            </div>
          </td>
          <td><span style="background:#f1f5f9;padding:3px 9px;border-radius:6px;font-size:12px;font-weight:600;">${a.student?.branch||'—'}</span></td>
          <td><strong style="color:#22c55e;">${a.student?.cgpa||'—'}</strong></td>
          <td style="font-size:13px;">${a.job?.role||'—'}</td>
          <td style="font-size:12px;color:#64748b;max-width:160px;">${a.feedback?UI.trunc(a.feedback,50):'<span style="color:#cbd5e1;">—</span>'}</td>
          <td>${UI.badge(a.status)}</td>
          <td>
            <div style="display:flex;gap:5px;">
              ${curTab==='SHORTLISTED'?`<button class="btn btn-success btn-sm" onclick="mark(${a.id},'PLACED')">🏆 Place</button>`:''}
              ${a.student?.resumeUrl?`<a href="http://localhost:8080${a.student.resumeUrl}" target="_blank" class="btn btn-outline btn-sm">📄</a>`:''}
            </div>
          </td>
        </tr>`).join('');
    }

    async function mark(id, status) {
      if (!confirm(`Mark as ${status}?`)) return;
      try { await Api.put(`/company/applications/${id}/status`, { status }); Toast.show(`Marked as ${status} ✅`,'success'); load(); }
      catch(e) { Toast.show(e.message,'error'); }
    }

    load();
</script>
</body>
</html>
