<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <script>document.documentElement.setAttribute("data-theme",localStorage.getItem("ps_theme")||"light");</script>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>Student Registration – CPMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Sora:wght@700;800&display=swap" rel="stylesheet"/>
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{--navy:#0d1b2a;--amber:#f59e0b;--amber-dark:#d97706;--border:#e2e8f0;--gray-100:#f1f5f9;--gray-400:#94a3b8;--text:#1e293b}
        body{font-family:'Space Grotesk',sans-serif;background:var(--gray-100);min-height:100vh;
             display:flex;align-items:center;justify-content:center;padding:32px 16px}
        .card{background:#fff;border-radius:20px;padding:40px;width:100%;max-width:640px;box-shadow:0 8px 40px rgba(0,0,0,.1)}
        .card-header{text-align:center;margin-bottom:32px}
        .card-header .icon{width:60px;height:60px;background:linear-gradient(135deg,var(--amber),var(--amber-dark));
                           border-radius:16px;display:flex;align-items:center;justify-content:center;
                           font-size:26px;margin:0 auto 16px}
        .card-header h2{font-family:'Sora',sans-serif;font-size:26px;font-weight:800;color:var(--navy);margin-bottom:6px}
        .card-header p{font-size:14px;color:var(--gray-400)}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
        .form-group{margin-bottom:16px}
        .form-label{display:block;margin-bottom:7px;font-size:12px;font-weight:600;color:var(--navy);letter-spacing:.3px}
        .form-control{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;
                      font-size:14px;color:var(--text);background:#fff;outline:none;font-family:inherit;transition:all .2s}
        .form-control:focus{border-color:var(--navy);box-shadow:0 0 0 3px rgba(13,27,42,.07)}
        .form-control::placeholder{color:var(--gray-400)}
        .submit-btn{width:100%;padding:13px;background:var(--navy);color:#fff;border:none;border-radius:10px;
                    font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;margin-top:8px}
        .submit-btn:hover{background:#1b2d42;transform:translateY(-1px)}
        .submit-btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
        .switch{text-align:center;margin-top:20px;font-size:14px;color:var(--gray-400)}
        .switch a{color:var(--navy);font-weight:600}
        .msg{padding:12px 16px;border-radius:9px;font-size:13px;font-weight:500;margin-bottom:16px;display:none}
        .msg.error  {background:#fef2f2;color:#b91c1c;border:1px solid #fecaca}
        .msg.success{background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0}
        .info-note{background:#eff6ff;border:1px solid #bfdbfe;border-radius:9px;padding:10px 14px;
                   font-size:13px;color:#1d4ed8;display:flex;align-items:center;gap:8px;margin-bottom:20px}
        @media(max-width:600px){.form-row{grid-template-columns:1fr}}

        /* dark mode */
        [data-theme="dark"] body{background:#111827}
        [data-theme="dark"] .left{background:#0f172a}
        [data-theme="dark"] .right{background:#1f2937}
        [data-theme="dark"] .auth-box h3{color:#e2e8f0}
        [data-theme="dark"] .form-control{background:#111827;border-color:#374151;color:#e2e8f0}
        [data-theme="dark"] .form-control:focus{border-color:#f59e0b;box-shadow:0 0 0 3px rgba(245,158,11,.15)}
        [data-theme="dark"] .role-tabs{background:#374151}
        [data-theme="dark"] .role-tab{color:#94a3b8}
        [data-theme="dark"] .role-tab.active{background:#0f172a;color:#f59e0b}
        [data-theme="dark"] .switch-link{color:#94a3b8}
        [data-theme="dark"] .switch-link a{color:#f59e0b}
        [data-theme="dark"] .sub{color:#6b7280}
        [data-theme="dark"] .msg.error{background:#450a0a;color:#fca5a5;border-color:#991b1b}
        [data-theme="dark"] .msg.success{background:#052e16;color:#86efac;border-color:#166534}

        /* dark mode toggle */
        .dm-btn{position:fixed;top:16px;right:16px;width:38px;height:38px;
                background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);
                border-radius:9px;display:flex;align-items:center;justify-content:center;
                cursor:pointer;font-size:17px;z-index:999;transition:all .2s}
        .dm-btn:hover{background:rgba(255,255,255,.18)}
    </style>
</head>
<body>
<div class="card">
    <div class="card-header">
        <div class="icon">👨‍🎓</div>
        <h2>Student Registration</h2>
        <p>Create your account to access campus placements</p>
    </div>

    <!-- Removed old @saitm.ac.in warning, replaced with helpful info note -->
    <div class="info-note">📧 An OTP will be sent to your college email for verification</div>

    <div class="msg error"   id="err-msg"></div>
    <div class="msg success" id="ok-msg"></div>

    <form id="reg-form">
        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Full Name *</label>
                <input class="form-control" id="name" placeholder="Rahul Kumar" required/>
            </div>
            <div class="form-group">
                <label class="form-label">Phone</label>
                <input class="form-control" id="phone" type="tel" placeholder="9876543210"/>
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">College Email *</label>
            <input class="form-control" id="email" type="email" placeholder="rahul@saitm.ac.in" required/>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Branch</label>
                <select class="form-control" id="branch">
                    <option value="">Select Branch</option>
                    <option>CSE</option><option>ECE</option><option>IT</option>
                    <option>ME</option><option>CE</option><option>EEE</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">CGPA (out of 10)</label>
                <input class="form-control" id="cgpa" type="number" placeholder="8.50" min="0" max="10" step="0.01"/>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Graduation Year</label>
                <input class="form-control" id="gradYear" type="number" placeholder="2025" min="2020" max="2030"/>
            </div>
            <div class="form-group">
                <label class="form-label">Password *</label>
                <input class="form-control" id="password" type="password" placeholder="Minimum 6 characters" required/>
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">Skills (comma-separated)</label>
            <input class="form-control" id="skills" placeholder="Java, Python, SQL, React"/>
        </div>
        <div class="form-group">
            <label class="form-label">LinkedIn Profile URL</label>
            <input class="form-control" id="linkedin" type="url" placeholder="https://linkedin.com/in/yourprofile"/>
        </div>
        <button type="submit" class="submit-btn" id="submit-btn">📝 Create Student Account</button>
    </form>

    <div class="switch">Already have an account? <a href="login.html">Sign in →</a></div>
</div>

<script>
    const API = 'https://placementsystem-production.up.railway.app/api';

    document.getElementById('reg-form').addEventListener('submit', async e => {
        e.preventDefault();
        const btn = document.getElementById('submit-btn');
        btn.disabled = true;
        btn.textContent = 'Registering…';
        document.getElementById('err-msg').style.display = 'none';
        document.getElementById('ok-msg').style.display  = 'none';

        try {
            const res = await fetch(`${API}/auth/register/student`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    name:           document.getElementById('name').value,
                    email:          document.getElementById('email').value,
                    password:       document.getElementById('password').value,
                    phone:          document.getElementById('phone').value,
                    branch:         document.getElementById('branch').value,
                    cgpa:           document.getElementById('cgpa').value || null,
                    graduationYear: document.getElementById('gradYear').value || null,
                    skills:         document.getElementById('skills').value,
                    linkedinUrl:    document.getElementById('linkedin').value
                })
            });

            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'Registration failed');

            // ✅ Save email + role to sessionStorage for verify-otp page
            sessionStorage.setItem('otp_email', document.getElementById('email').value);
            sessionStorage.setItem('otp_role', 'STUDENT');

            const ok = document.getElementById('ok-msg');
            ok.textContent = '✅ Registered! Redirecting to OTP verification…';
            ok.style.display = 'block';

            // ✅ Redirect to OTP verification page after 1.5s
            setTimeout(() => {
                window.location.href = 'verify-otp.html';
            }, 1500);

        } catch (err) {
            const el = document.getElementById('err-msg');
            el.textContent = '❌ ' + err.message;
            el.style.display = 'block';
            btn.disabled = false;
            btn.textContent = '📝 Create Student Account';
        }
    });
</script>
</body>
</html>
