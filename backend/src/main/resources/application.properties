# ============================================================
# Campus Placement Management System - Application Config
# ============================================================

# ================= SERVER =================
server.port=${PORT:8080}

# ================= DATABASE =================
spring.datasource.url=${DATABASE_URL:jdbc:mysql://caboose.proxy.rlwy.net:55740/railway?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:tvUwRryOblPiZEbHxLsFVuQaFmPNmtWv}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ================= JPA / HIBERNATE =================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ================= JWT =================
app.jwt.secret=${JWT_SECRET:PlacementSystem2024SecretKeyForJWTTokenGenerationMustBe256BitsLong!}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# ================= COLLEGE DOMAIN =================
app.college.email.domain=${COLLEGE_EMAIL_DOMAIN:@saitm.ac.in}

# ================= APP NAME =================
app.name=Campus Placement System

# ================= EMAIL (Gmail SMTP) =================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USERNAME}
spring.mail.password=${GMAIL_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ================= FILE UPLOAD =================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ================= UPLOAD DIRECTORY =================
app.upload.dir=${UPLOAD_DIR:/tmp/uploads}

# ================= ASYNC + SCHEDULING =================
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=8

# ================= LOGGING =================
logging.level.org.springframework=INFO
logging.level.com.uttam=DEBUG

# ================= CIRCULAR REFERENCES =================
spring.main.allow-circular-references=true