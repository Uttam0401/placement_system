# ============================================================
# Campus Placement Management System - Application Config
# ============================================================

# ================= SERVER =================
server.port=8080

# ================= DATABASE =================
spring.datasource.url=jdbc:mysql://localhost:3306/placement_system?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ================= JPA / HIBERNATE =================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ================= JWT =================
app.jwt.secret=PlacementSystem2024SecretKeyForJWTTokenGenerationMustBe256BitsLong!
app.jwt.expiration=86400000

# ================= VALIDATION =================
app.college.email.domain=@college.edu

# ================= FILE UPLOAD =================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ================= UPLOAD DIRECTORY =================
app.upload.dir=./uploads/resumes

# ================= LOGGING =================
logging.level.org.springframework=INFO

spring.main.allow-circular-references=true